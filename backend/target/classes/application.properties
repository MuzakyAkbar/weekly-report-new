# ==============================
# Server
# ==============================
server.port=${PORT:3001}

# ==============================
# Database PostgreSQL
# ==============================
spring.datasource.url=jdbc:postgresql://${DB_HOST:192.168.1.38}:${DB_PORT:5432}/${DB_NAME:openbravo}
spring.datasource.username=${DB_USER:tad}
spring.datasource.password=${DB_PASSWORD:tadisiang}
spring.datasource.driver-class-name=org.postgresql.Driver

# Connection Pool (HikariCP — bawaan Spring Boot)
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.idle-timeout=30000
spring.datasource.hikari.connection-timeout=5000
spring.datasource.hikari.pool-name=ReportHikariPool

# ==============================
# Logging
# ==============================
logging.level.com.tatahuy=INFO
logging.level.org.springframework.jdbc=WARN
